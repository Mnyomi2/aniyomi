name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build signed release APK
        run: ./gradlew assembleRelease -Penable-updater

      - name: Prepare APK artifacts
        run: |
          mkdir -p apk-out
          cp app/build/outputs/apk/release/*.apk apk-out/ || true
          ls -lh apk-out/

      - name: Get version name
        id: version
        run: |
          VER=$(grep -oE 'versionName = "[^"]+"' app/build.gradle.kts | head -1 | sed -E 's/versionName = "([^"]+)"/\1/')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=build-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Delete existing build releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 50 | awk '$1 ~ /^build-/' | while read -r tag rest; do
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes || true
          done

      - name: Create GitHub Release with APKs
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Aniyomi ${{ steps.version.outputs.version }} (${{ steps.version.outputs.tag }})
          body: |
            Signed release APK build from commit `${{ github.sha }}`.

            | Variant | Notes |
            | ------- | ----- |
            | Universal | All ABIs (large) |
            | arm64-v8a | 64-bit ARM (recommended) |
            | armeabi-v7a | 32-bit ARM |
            | x86 | 32-bit x86 |
            | x86_64 | 64-bit x86 |
          files: |
            apk-out/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

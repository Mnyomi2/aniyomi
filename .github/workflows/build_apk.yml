name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build signed release APK
        run: ./gradlew assembleRelease -Penable-updater

      - name: Prepare APK artifacts
        run: |
          mkdir -p apk-out
          cp app/build/outputs/apk/release/app-armeabi-v7a-release.apk apk-out/ || true
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk apk-out/ || true
          cp app/build/outputs/apk/release/app-x86-release.apk apk-out/ || true
          cp app/build/outputs/apk/release/app-x86_64-release.apk apk-out/ || true
          ls -lh apk-out/

      - name: Upload APKs to BUILD APK branch
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apk-out
          publish_branch: BUILD-APK
          commit_message: "Build signed release APK ${{ github.sha }}"
          force_orphan: true

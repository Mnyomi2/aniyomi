name: Fast Build & Test

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fast-build-test
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build APK and smoke-test on emulator
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug -Penable-updater

      - name: Prepare APK artifact
        run: |
          mkdir -p apk-out
          cp app/build/outputs/apk/debug/*.apk apk-out/ || true
          echo "=== APKs produced ==="
          ls -lh apk-out/ || { echo "::error::No APK produced in app/build/outputs/apk/debug"; exit 1; }
          if [ -z "$(ls -A apk-out 2>/dev/null)" ]; then
            echo "::error::apk-out is empty; build did not emit an APK"
            exit 1
          fi

      - name: Write emulator smoke-test script
        run: |
          cat > "${{ github.workspace }}/emulator_test.sh" <<'EOF'
          set -euo pipefail
          APK_DIR="${{ github.workspace }}/apk-out"
          # Auto-detect any produced APK. The emulator here is 32-bit x86 (API 24),
          # so prefer the x86 APK over x86_64 to avoid INSTALL_FAILED_NO_MATCHING_ABIS.
          APK=""
          shopt -s nullglob
          candidates=(
            "$APK_DIR"/app-x86-debug.apk
            "$APK_DIR"/app-x86*.apk
            "$APK_DIR"/app-universal*.apk
            "$APK_DIR"/app-x86_64*.apk
            "$APK_DIR"/*.apk
          )
          for cand in "${candidates[@]}"; do
            if [ -f "$cand" ]; then APK="$cand"; break; fi
          done
          if [ -z "$APK" ]; then
            echo "::error::No APK found in $APK_DIR"
            ls -lh "$APK_DIR" || true
            exit 1
          fi
          echo "Using APK: $APK"

          adb wait-for-device
          adb logcat -c || true

          echo "Installing APK..."
          if ! adb install -r -t "$APK"; then
            echo "::error::adb install failed"
            exit 1
          fi
          echo "Install OK"

          # Detect the real installed package (debug builds append .dev via applicationIdSuffix).
          PKG="$(adb shell pm list packages | grep -iE 'xyz.jmir.tachiyomi.mi' | head -n1 | sed -E 's/^package://; s/\r$//')"
          if [ -z "$PKG" ]; then
            echo "::error::Could not determine installed package name"
            adb shell pm list packages | grep -i tachiyomi || true
            exit 1
          fi
          echo "Detected package: $PKG"

          # Resolve the launcher activity dynamically.
          LAUNCHER="$(adb shell cmd package resolve-activity --brief "$PKG" | tail -n1 | sed -E 's/\r$//')"
          if [ -z "$LAUNCHER" ] || [ "$LAUNCHER" = "No activity found" ]; then
            LAUNCHER="$PKG/eu.kanade.tachiyomi.ui.main.MainActivity"
          fi
          echo "Launching: $LAUNCHER"
          adb shell am start -n "$LAUNCHER" \
            || { echo "::error::am start failed"; exit 1; }

          sleep 20

          echo "=== checking process ==="
          PID="$(adb shell ps | grep "$PKG" | awk '{print $2}' | head -n1 || true)"
          if [ -z "$PID" ]; then
            echo "::error::App process not found after launch"
            adb logcat -d | grep -iE "FATAL EXCEPTION|AndroidRuntime|died" | head -n 40 || true
            exit 1
          fi
          echo "App process alive (pid $PID)"

          echo "=== checking for launch crashes ==="
          if adb logcat -d | grep -iE "FATAL EXCEPTION|AndroidRuntime.*Crash|has died"; then
            echo "::error::App crashed on launch"
            exit 1
          fi

          echo "=== checking UI rendered (window present) ==="
          if ! adb shell dumpsys window | grep -iE "mCurrentFocus.*$PKG|mFocusedApp.*$PKG"; then
            echo "::warning::No focused window for $PKG yet; app may still be initializing"
          else
            echo "UI rendered for $PKG"
          fi

          echo "SMOKE TEST PASSED"
          EOF
          chmod +x "${{ github.workspace }}/emulator_test.sh"

      - name: Smoke test on Android 7 (API 24) emulator
        uses: ReactiveCircus/android-emulator-runner@4c44018e59b437e86cdfc41da381398f93ed8808 # v2
        with:
          api-level: 24
          target: default
          arch: x86
          profile: ''
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: bash ${{ github.workspace }}/emulator_test.sh

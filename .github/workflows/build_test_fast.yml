name: Fast Build & Test (armeabi-v7a)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fast-build-test
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build armeabi-v7a APK and smoke-test on emulator
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build only armeabi-v7a release APK
        run: ./gradlew assembleRelease -Penable-updater -Pandroid.injected.build.abi=armeabi-v7a

      - name: Write emulator smoke-test script
        run: |
          cat > "${{ github.workspace }}/emulator_test.sh" <<'EOF'
          set -euo pipefail
          RELEASE_DIR="${{ github.workspace }}/app/build/outputs/apk/release"
          APK=""
          for cand in "$RELEASE_DIR/app-armeabi-v7a-release.apk" "$RELEASE_DIR/app-universal-release.apk"; do
            if [ -f "$cand" ]; then APK="$cand"; break; fi
          done
          if [ -z "$APK" ]; then
            echo "::error::No armeabi-v7a/universal APK found in $RELEASE_DIR"
            ls -lh "$RELEASE_DIR" || true
            exit 1
          fi
          echo "Using APK: $APK"
          adb install -r "$APK"
          adb shell am start -n xyz.jmir.tachiyomi.mi/eu.kanade.tachiyomi.ui.main.MainActivity
          sleep 25
          if adb logcat -d -b crash | grep -iE "FATAL EXCEPTION|AndroidRuntime.*Crash|died"; then
            echo "::error::App crashed on launch"
            exit 1
          fi
          PID="$(adb shell pidof xyz.jmir.tachiyomi.mi || true)"
          if [ -n "$PID" ]; then
            echo "App process alive (pid $PID)"
          else
            echo "::error::App process not found after launch"
            exit 1
          fi
          EOF
          chmod +x "${{ github.workspace }}/emulator_test.sh"

      - name: Smoke test on Android 7 (API 24) emulator
        uses: ReactiveCircus/android-emulator-runner@4c44018e59b437e86cdfc41da381398f93ed8808 # v2
        with:
          api-level: 24
          target: default
          arch: x86
          profile: ''
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: bash ${{ github.workspace }}/emulator_test.sh

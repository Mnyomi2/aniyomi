name: Fast Build & Test (armeabi-v7a)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fast-build-test
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build armeabi-v7a APK and smoke-test on emulator
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build only armeabi-v7a release APK
        run: ./gradlew assembleRelease -Penable-updater -Pandroid.injected.build.abi=armeabi-v7a

      - name: Prepare APK artifact
        run: |
          mkdir -p apk-out
          cp app/build/outputs/apk/release/*.apk apk-out/ || true
          echo "=== APKs produced ==="
          ls -lh apk-out/ || { echo "::error::No APK produced in app/build/outputs/apk/release"; exit 1; }

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: apk-out/*.apk
          if-no-files-found: warn

      - name: Write emulator smoke-test script
        run: |
          cat > "${{ github.workspace }}/emulator_test.sh" <<'EOF'
          set -euo pipefail
          PKG="xyz.jmir.tachiyomi.mi"
          APK_DIR="${{ github.workspace }}/apk-out"
          APK=""
          for cand in "$APK_DIR/app-armeabi-v7a-release.apk" "$APK_DIR/app-universal-release.apk" "$APK_DIR"/*.apk; do
            if [ -f "$cand" ]; then APK="$cand"; break; fi
          done
          if [ -z "$APK" ]; then
            echo "::error::No armeabi-v7a/universal APK found in $APK_DIR"
            ls -lh "$APK_DIR" || true
            exit 1
          fi
          echo "Using APK: $APK"

          adb wait-for-device
          adb logcat -c || true

          echo "Installing APK..."
          if ! adb install -r -t "$APK"; then
            echo "::error::adb install failed"
            exit 1
          fi
          echo "Install OK"

          echo "Launching MainActivity..."
          adb shell am start -n "$PKG/eu.kanade.tachiyomi.ui.main.MainActivity" \
            || { echo "::error::am start failed"; exit 1; }

          sleep 20

          echo "=== checking process ==="
          PID="$(adb shell ps | grep "$PKG" | awk '{print $2}' | head -n1 || true)"
          if [ -z "$PID" ]; then
            echo "::error::App process not found after launch"
            adb logcat -d | grep -iE "FATAL EXCEPTION|AndroidRuntime|died" | head -n 40 || true
            exit 1
          fi
          echo "App process alive (pid $PID)"

          echo "=== checking for launch crashes ==="
          if adb logcat -d | grep -iE "FATAL EXCEPTION|AndroidRuntime.*Crash|has died"; then
            echo "::error::App crashed on launch"
            exit 1
          fi

          echo "=== checking UI rendered (window present) ==="
          if ! adb shell dumpsys window | grep -iE "mCurrentFocus.*$PKG|mFocusedApp.*$PKG"; then
            echo "::warning::No focused window for $PKG yet; app may still be initializing"
          else
            echo "UI rendered for $PKG"
          fi

          echo "SMOKE TEST PASSED"
          EOF
          chmod +x "${{ github.workspace }}/emulator_test.sh"

      - name: Smoke test on Android 7 (API 24) emulator
        uses: ReactiveCircus/android-emulator-runner@4c44018e59b437e86cdfc41da381398f93ed8808 # v2
        with:
          api-level: 24
          target: default
          arch: x86
          profile: ''
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: bash ${{ github.workspace }}/emulator_test.sh
